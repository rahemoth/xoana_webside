spring:
  application:
    name: xoana-backend
  datasource:
    url: jdbc:h2:mem:xoanadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
    web:
      resources:
        static-locations: classpath:/static/,file:${UPLOAD_DIR:./uploads}/

server:
  port: ${SERVER_PORT:8080}
  url: ${SERVER_URL:http://localhost:8080}

logging:
  level:
    root: INFO
    com.xoana: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
    org.hibernate.type: INFO

app:
  jwt:
    secret: xoanaSecretKey2024VeryLongSecretKeyForJWTSigningThatIsAtLeast256BitsLong
    expiration: 86400000  # 24 hours in ms
  upload:
    dir: ${UPLOAD_DIR:./uploads}
  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://localhost:3306/xoana?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:xoana}
    password: ${DB_PASSWORD:xoana123}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  h2:
    console:
      enabled: false

